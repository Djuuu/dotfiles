## Resources ###################################################################
# https://tmuxcheatsheet.com/
# https://man7.org/linux/man-pages/man1/tmux.1.html
# https://github.com/catppuccin/tmux/blob/main/docs/reference/configuration.md

## Options #####################################################################

set -as terminal-features ",*:hyperlinks"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on

# unbind C-b
set -g prefix C-q
set -g prefix2 C-n

bind C-s previous-window
bind C-f next-window

bind C-r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

## Catppuccin ##################################################################

%hidden CATPPUCCIN_PATH="~/.dotfiles/.config/tmux/catppuccin-tmux"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
#set -g @catppuccin_status_connect_separator "no"
#set -g @catppuccin_status_right_separator ""

set -g @catppuccin_window_text         " #T · #W"
set -g @catppuccin_window_current_text " #T · #W"

# set -g @catppuccin_[module_name]_icon "icon"
# set -g @catppuccin_[module_name]_color "color"
# set -g @catppuccin_[module_name]_text "text"
# set -g @catppuccin_status_[module_name]_bg_color "#{@thm_surface_0}"
set -g @catppuccin_gitmux_color "#{@thm_peach}"

run ${CATPPUCCIN_PATH}/catppuccin.tmux

## Status line #################################################################

# Status line margin hack
%hidden SPC="                                                  " # 50 spaces
set -g status 2
set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[0]' "#[bg=black]${SPC}${SPC}${SPC}${SPC}${SPC}${SPC}${SPC}${SPC}" # 400 spaces

set -g status-left-length 100
set -g status-right-length 100
set -g status-justify centre

## Status line - left

set -g status-left ""
set -agF status-left "#{@catppuccin_status_gitmux}"

## Status line - right

set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_application}"
# set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}" # Only useful on laptops
set -agF status-right "#[fg=#666666]| #[fg=white]%H:%M "

## Local config ################################################################

source -q ~/.dotfiles/.config/tmux/tmux.conf.local

# Plugins ######################################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'AngryMorrocoy/tmux-neolazygit'

## Source local plugins config

source -q ~/.dotfiles/.config/tmux/tmux.plugins.local

# Initialize TMUX plugin manager

run '~/.dotfiles/.config/tmux/tpm/tpm'
