
# Config relating to the Lazygit UI
gui:
  # The number of lines you scroll by when scrolling the main window
  scrollHeight: 16 # default: 2

  # If true, allow scrolling past the bottom of the content in the main window
  scrollPastBottom: false # default: true

  # If true, do not show a warning when rewording a commit via an external editor
  skipRewordInEditorWarning: true

  # If true, increase the height of the focused side window; creating an accordion effect.
  expandFocusedSidePanel: true # default: false

  # If true, don't give a side panel more height than it needs to show its
  # content; when all panels fit, the leftover height is shared among them so that
  # they still fill the screen.
  shrinkSidePanelsToContent: true

  # The side panels, in the order they appear from top to bottom.
  # Each entry is a list of one or more names that share a single panel as tabs
  # (cycle through them with the next-tab/previous-tab keys).
  # Omit a name to hide it; give a name its own one-element list to promote a tab
  # to a top-level panel.
  # Valid names are: 'status', 'files', 'worktrees', 'submodules', 'branches',
  # 'remotes', 'tags', 'commits', 'reflog', 'stash'. 'files', 'branches', and
  # 'commits' must always be included; they can't be hidden.
  sidePanels:
    - [status]
    - [files, submodules, worktrees]
    #- [branches, remotes, tags]
    - [branches, remotes, tags, stash]
    - [commits, reflog]
    #- [stash]

  # One of 'auto' (default) | 'en' | 'zh-CN' | 'zh-TW' | 'pl' | 'nl' | 'ja' | 'ko' | 'ru'
  language: en

  # Format used when displaying time e.g. commit time.
  # Uses Go's time format syntax: https://pkg.go.dev/time#Time.Format
  timeFormat: 02 Jan 06

  # Format used when displaying time if the time is less than 24 hours ago.
  # Uses Go's time format syntax: https://pkg.go.dev/time#Time.Format
  shortTimeFormat: 15:04 # default: '3:04PM'

  # Config relating to colors and styles.
  # See https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md#color-attributes
  theme:
    activeBorderColor:   ['#00BE87', bold] # Border color of focused window
    inactiveBorderColor: ['#BBBBBB']       # Border color of non-focused windows

  # If true, add a "/" root item in the file tree representing the root of the
  # repository. It is only added when necessary, i.e. when there is more than one
  # item at top level.
  showRootItemInFileTree: false

  # If true, show the number of lines changed per file in the Files view
  showNumstatInFilesView: true # default: false

  # Nerd fonts version to use.
  # One of: '2' | '3' | empty string (default)
  # If empty, do not show icons.
  nerdFontsVersion: "3"

  # Whether to show the divergence from the base branch in the branches view.
  # One of: 'none' | 'onlyArrow'  | 'arrowAndNumber'
  showDivergenceFromBaseBranch: arrowAndNumber # default: none

  # Status panel view.
  # One of 'dashboard' (default) | 'allBranchesLog'
  statusPanelView: allBranchesLog

  # If true, when using the panel jump keys (default 1 through 5) and target panel
  # is already active, go to next tab instead
  switchTabsWithPanelJumpKeys: true # default: false

# Config relating to git
git:
  # See https://github.com/jesseduffield/lazygit/blob/master/docs/Custom_Pagers.md
  # for more information.
  pagers:
    # If true, Lazygit will use git's `diff.external` config for paging.
    # The advantage over `externalDiffCommand` is that this can be
    # configured per file type in .gitattributes; see
    # https://git-scm.com/docs/gitattributes#_defining_an_external_diff_driver.
    - useExternalDiffGitConfig: true

  # Config relating to merging
  merging:
    # Extra args passed to `git merge`, e.g. --no-ff
    args: '--no-ff'

  # If true, periodically fetch from remote
  autoFetch: false # default: true

  # Command used when displaying the current branch git log in the main window
  #   default: git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --
  branchLogCmd: git context-graph --pretty=graph-dyn-lg {{branchName}} --

  # Commands used to display git log of all branches in the main window, they will
  # be cycled in order of appearance (array of strings)
  allBranchesLogCmds: # []
    ## default
    #- git log --graph --all --color=always --abbrev-commit --decorate --date=relative  --pretty=medium
    ## custom
    - git context-graph --pretty=graph-dyn-lg --first-parent --all    --
    - git context-graph --pretty=graph-dyn-lg --first-parent --reflog --

  # When copying commit hashes to the clipboard, truncate them to this length. Set
  # to 40 to disable truncation.
  truncateCopiedCommitHashesTo: 40 # default: 12

########################################################################################################################
# https://github.com/jesseduffield/lazygit/blob/master/docs/Custom_Command_Keybindings.md
# https://github.com/jesseduffield/lazygit/blob/master/docs/keybindings/Custom_Keybindings.md

customCommands:

  - key: '<U>'
    context: 'global'
    command: "git update"
    description: 'Fetch remote and fast-forward main branch'
    output: logWithPty # none | terminal | log | logWithPty | popup

  - key: '<ctrl+d>'
    context: 'files'
    command: 'clear; git diff {{.SelectedFile.Name | quote}}'
    description: 'Open diff'
    output: terminal # none | terminal | log | logWithPty | popup
  - key: '<ctrl+d>'
    context: 'commitFiles'
    command: 'clear; git diff {{.SelectedCommit.Hash | quote}}~ -- {{.SelectedCommitFile.Name | quote}}'
    description: 'Open diff'
    output: terminal # none | terminal | log | logWithPty | popup
  - key: '<ctrl+d>'
    context: 'commits,subCommits,reflogCommits'
    command: 'clear; git diff {{.SelectedCommitRange.From}}~ {{.SelectedCommitRange.To}}'
    description: 'Open diff'
    output: terminal # none | terminal | log | logWithPty | popup

  - key: '<a>'
    context: 'localBranches,remoteBranches'
    command: 'git context-graph --fold-toggle'
    description: 'Toggle folding in branch graph log'
    output: none # none | terminal | log | logWithPty | popup

  - key: '<alt+c>'
    context: 'localBranches'
    command: "git context-graph {{ .SelectedLocalBranch.Name }} --config-toggle {{ .Form.Branch }}"
    description: "Toggle branch in current context"
    output: log # none | terminal | log | logWithPty | popup
    prompts:
      - type: 'menuFromCommand' # input | confirm | menu | menuFromCommand
        title: "Toggle branch in context of {{ .SelectedLocalBranch.Name }}"
        key: 'Branch'
        command: 'git context-graph {{ .SelectedLocalBranch.Name }} --list-status'
        filter: '(?P<status>.*)\t(?P<branch>.*)'
        valueFormat: '{{ .branch }}'
        labelFormat: >-
          {{ if eq .status " * " }}{{ .status | green | bold }} {{ .branch | underline }}{{ end }}
          {{ if eq .status "[*]" }}{{ .status | green | bold }} {{ .branch | bold      }}{{ end }}
          {{ if eq .status "[ ]" }}{{ .status | white        }} {{ .branch             }}{{ end }}

  - key: '<ctrl+alt+c>'
    context: 'localBranches'
    command: "git context-graph {{ .SelectedLocalBranch.Name }} --config-toggle {{ .Form.Branch }} --sync"
    description: "Toggle branch in current context preset (+sync)"
    output: log # none | terminal | log | logWithPty | popup
    prompts:
      - type: 'menuFromCommand' # input | confirm | menu | menuFromCommand
        title: "Toggle branch in current context preset (+sync)"
        key: 'Branch'
        command: 'git context-graph {{ .SelectedLocalBranch.Name }} --list-status'
        filter: '(?P<status>.*)\t(?P<branch>.*)'
        valueFormat: '{{ .branch }}'
        labelFormat: >-
          {{ if eq .status " * " }}{{ .status | green | bold }} {{ .branch | underline }}{{ end }}
          {{ if eq .status "[*]" }}{{ .status | green | bold }} {{ .branch | bold      }}{{ end }}
          {{ if eq .status "[ ]" }}{{ .status | white        }} {{ .branch             }}{{ end }}

  - key: '<ctrl+a>'
    context: 'localBranches'
    command: "git {{.Form.action}} {{ .SelectedLocalBranch.Name }}"
    description: "git [f]pushall"
    loadingText: "Pushing to all remotes..."
    output: popup
    prompts:
      - type: 'menu' # input | confirm | menu | menuFromCommand
        title: 'Push to all remotes'
        key: 'action'
        options:
          - { value: 'pushall', name: 'push', description: 'Push {{ .SelectedLocalBranch.Name }} to all remotes' }
          - { value: 'fpushall', name: 'force', description: 'Force-push {{ .SelectedLocalBranch.Name }} to all remotes' }

  - key: '<ctrl+g>'
    description: "git-mr"
    commandMenu:

      - key: s
        context: 'status,files,remotes,tags,commits'
        command: 'git mr status'
        description: 'git mr status'
        output: popup
      - key: s
        context: 'localBranches'
        command: 'git mr status {{.SelectedLocalBranch.Name}}'
        description: 'git mr status                 {{ branch }}'
        output: popup
      - key: s
        context: 'remoteBranches'
        command: 'git mr status {{.SelectedRemoteBranch.Name}}'
        description: 'git mr status                 {{ branch }}'
        output: popup

      - key: m
        context: 'status,files,remotes,tags,commits'
        command: 'git mr menu status'
        description: 'git mr menu status'
        output: popup
      - key: m
        context: 'localBranches'
        command: 'git mr menu $(git mr code {{.SelectedLocalBranch.Name}})'
        description: 'git mr menu status            {{ code }}'
        output: popup
      - key: m
        context: 'remoteBranches'
        command: 'git mr menu $(git mr code {{.SelectedRemoteBranch.Name}})'
        description: 'git mr menu status            {{ code }}'
        output: popup

      - key: n
        context: 'status,files,remotes,tags,commits'
        command: 'git mr menu status --no-links'
        description: 'git mr menu status --no-links'
        output: terminal
      - key: n
        context: 'localBranches'
        command: 'git mr menu status --no-links $(git mr code {{.SelectedLocalBranch.Name}})'
        description: 'git mr menu status --no-links {{ branch code }}'
        output: terminal
      - key: n
        context: 'remoteBranches'
        command: 'git mr menu status --no-links $(git mr code {{.SelectedRemoteBranch.Name}})'
        description: 'git mr menu status --no-links {{ branch code }}'
        output: terminal

      - key: o
        context: 'status,files,remotes,tags,commits'
        command: 'git mr open'
        description: 'git mr open'
        output: none
        loadingText: 'Opening merge request'
      - key: o
        context: 'localBranches'
        command: 'git mr open {{.SelectedLocalBranch.Name}}'
        description: 'git mr open                   {{ branch }}'
        output: none
        loadingText: 'Opening merge request'
      - key: o
        context: 'remoteBranches'
        command: 'git mr open {{.SelectedRemoteBranch.Name}}'
        description: 'git mr open                   {{ branch }}'
        output: none
        loadingText: 'Opening merge request'

      - key: u
        context: 'status,files,remotes,tags,commits'
        command: 'git mr update'
        description: 'git mr update'
        output: terminal
